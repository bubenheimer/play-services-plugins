# This project does not use Kotlin in production yet, so prevent adding the Kotlin dependencies.
kotlin.stdlib.default.dependency=false

# Suppress Protobuf security warnings caused by AGP using an older version of the Protobuf compiler.
# This check was introduced in Protobuf 4.22+ to detect code generated with vulnerable versions.
# Since we cannot modify AGP internally, we acknowledge the risk for build-time operations.
systemProp.com.google.protobuf.use_unsafe_pre22_gencode=true

org.gradle.configuration-cache=true
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=1024m
